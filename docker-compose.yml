version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "7001:7001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
